name: Quota Intelligence Monitor

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run quota monitor
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          SUDO_PAT: ${{ secrets.SUDO_PAT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 quota_monitor.py

      - name: Commit quota state
        run: |
          git config user.name "quota-intelligence[bot]"
          git config user.email "quota-intelligence[bot]@users.noreply.github.com"
          git add quota-state.json || true
          git diff --staged --quiet || git commit -m "chore: quota state $(date +%Y-%m-%d) [skip ci]"
          git push || true
