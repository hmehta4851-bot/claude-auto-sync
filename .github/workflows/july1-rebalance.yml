name: July 1 Auto-Rebalance

on:
  schedule:
    - cron: "0 0 1 7 *"
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        default: enable-split
        type: choice
        options:
          - enable-split
          - enable-bot-disable-sudo
          - enable-sudo-disable-bot
          - status-check-only

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run rebalance
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          SUDO_PAT: ${{ secrets.SUDO_PAT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ACTION_INPUT: ${{ inputs.action || 'enable-split' }}
          EVENT_NAME: ${{ github.event_name }}
        run: python3 rebalance.py
